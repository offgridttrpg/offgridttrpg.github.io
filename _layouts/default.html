<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="https://cdn.simplecss.org/simple.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400;1,700&display=swap');
    
    /* Override Simple.css custom properties */
    :root {
      --sans-font: 'Lora', Georgia, 'Times New Roman', serif;
      --mono-font: 'Courier New', Courier, monospace;
      --standard-border-radius: 0;
      --body-max-width: 70ch;
      --body-padding: 1rem;
    }
    
    /* Typography */
    body {
      font-family: 'Lora', Georgia, 'Times New Roman', serif;
      font-size: 1.1rem;
      line-height: 1.75;
    }
    
    /* Headings: same face, measured sizing, no decorative borders */
    h1, h2, h3, h4, h5, h6 {
      font-family: 'Lora', Georgia, 'Times New Roman', serif;
      font-weight: 700;
      line-height: 1.3;
      border-bottom: none;
    }
    
    h1 {
      font-size: 1.7rem;
      margin-bottom: 0.25em;
    }
    
    h2 {
      font-size: 1.2rem;
      margin-top: 3.5rem;
      margin-bottom: 1.5rem;
      letter-spacing: 0.01em;
    }
    
    /* Simple.css adds border-bottom to h1 inside header — remove it */
    header h1,
    header h2 {
      border-bottom: none;
    }
    
    /* Paragraph rhythm */
    p {
      margin-top: 0;
      margin-bottom: 1.25em;
    }
    
    /* The horizontal rules are structural in this text — keep them quiet */
    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 3rem auto;
      width: 40%;
    }
    
    /* Constrain reading width and center */
    body > main,
    main {
      max-width: 70ch;
      margin-inline: auto;
      padding-inline: 1.5rem;
    }
    
    /* Footer / colophon */
    body > footer {
      font-size: 0.85rem;
      margin-top: 4rem;
      text-align: center;
      opacity: 0.6;
    }
    
    /* Italic — Lora's italic is good, let it work */
    em {
      font-style: italic;
    }
    
    /* Light mode text softening — pure black is harsh with Lora at this size */
    @media (prefers-color-scheme: light) {
      body {
        color: #1a1a1a;
      }
    }
  </style>
</head>
<body>
  <main>{{ content }}</main>
</body>
</html>
